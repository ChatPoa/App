function ShareModal({ t, onClose }) {
  return (
    <ModalShell t={t} onClose={onClose} width={380}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "16px 18px", borderBottom: `1px solid ${t.line}` }}>
