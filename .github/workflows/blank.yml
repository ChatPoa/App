      </div>
    </AuthShell>
  );
}
function RegisterScreen({ t, go }) {
  return (
    <AuthShell t={t}>
      <div style={{ marginBottom: 28 }}><PoaMark size={40} /></div>
      <h2 style={{ fontSize: 22, fontWeight: 700, color: t.text1, margin: "0 0 20px" }}>Create your account</h2>
      <Field t={t} label="Full name" placeholder="Jordan Lee" />
      <Field t={t} label="Email" placeholder="name@company.com" />
      <Field t={t} label="Password" toggle placeholder="At least 8 characters" />
      <Btn t={t} variant="primary" full onClick={() => go("verify")} style={{ marginTop: 6 }}>Continue</Btn>
      <div style={{ textAlign: "center", marginTop: 18, fontSize: 13.5, color: t.text2 }}>
        Already have an account? <span onClick={() => go("login")} style={{ color: BLUE, fontWeight: 600, cursor: "pointer" }}>Log in</span>
      </div>
    </AuthShell>
  );
}
function VerifyScreen({ t, go }) {
  return (
    <AuthShell t={t}>
      <div style={{ width: 56, height: 56, borderRadius: "50%", background: t.surface2, display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 20 }}>
        <Mail size={24} color={BLUE} />
      </div>
      <h2 style={{ fontSize: 21, fontWeight: 700, color: t.text1, margin: "0 0 8px" }}>Check your inbox</h2>
      <p style={{ fontSize: 14, color: t.text2, margin: "0 0 24px" }}>We sent a 6-digit code to your email. Enter it below to verify your account.</p>
      <div style={{ display: "flex", gap: 10, marginBottom: 24 }}>
        {[0, 1, 2, 3, 4, 5].map((i) => (
          <input key={i} maxLength={1} style={{ width: 44, height: 52, textAlign: "center", fontSize: 18, fontWeight: 700, borderRadius: 10, border: `1px solid ${t.line}`, background: t.surface2, color: t.text1, outline: "none" }} />
        ))}
      </div>
      <Btn t={t} variant="primary" full onClick={() => go("username")}>Verify</Btn>
    </AuthShell>
  );
}
function ForgotScreen({ t, go }) {
  return (
    <AuthShell t={t}>
      <h2 style={{ fontSize: 21, fontWeight: 700, color: t.text1, margin: "0 0 8px" }}>Reset your password</h2>
      <p style={{ fontSize: 14, color: t.text2, margin: "0 0 20px" }}>Enter the email on your account and we'll send a reset link.</p>
      <Field t={t} label="Email" placeholder="name@company.com" />
      <Btn t={t} variant="primary" full onClick={() => go("reset")}>Send reset link</Btn>
      <div style={{ textAlign: "center", marginTop: 18 }}>
        <span onClick={() => go("login")} style={{ fontSize: 13.5, color: t.text2, cursor: "pointer" }}>← Back to log in</span>
      </div>
    </AuthShell>
  );
}
function ResetScreen({ t, go }) {
  return (
    <AuthShell t={t}>
      <h2 style={{ fontSize: 21, fontWeight: 700, color: t.text1, margin: "0 0 20px" }}>Set a new password</h2>
