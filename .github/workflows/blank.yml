/* =================================================================
   ROOT APP
================================================================= */
const AUTH_SCREENS = { splash: SplashScreen, welcome: WelcomeScreen, login: LoginScreen, register: RegisterScreen, verify: VerifyScreen, forgot: ForgotScreen, reset: ResetScreen, username: UsernameScreen };

export default function ChatPoaApp() {
  const [dark, setDark] = useState(false);
  const [view, setView] = useState("splash");
  const [posts, setPosts] = useState(POSTS);
  const [modal, setModal] = useState(null);
  const [editingProfile, setEditingProfile] = useState(false);
  const t = useTokens(dark);

  const addPost = (text) => setPosts([{ id: Date.now(), user: ME, time: "just now", text, likes: 0, comments: 0 }, ...posts]);

  if (AUTH_SCREENS[view]) {
    const Screen = AUTH_SCREENS[view];
    return (
      <div data-theme={dark ? "dark" : "light"}>
        <GlobalStyle />
        <Screen t={t} go={setView} />
      </div>
    );
  }

  const screens = {
    home: <HomeFeed t={t} posts={posts} setPosts={setPosts} openCompose={() => setModal({ type: "compose" })} openComments={(p) => setModal({ type: "comments", post: p })} openShare={() => setModal({ type: "share" })} />,
    profile: <ProfileScreen t={t} self posts={posts} editing={editingProfile} setEditing={setEditingProfile} />,
    otherProfile: <ProfileScreen t={t} self={false} posts={posts} editing={false} setEditing={() => {}} />,
    friends: <FriendsScreen t={t} />,
    chat: <ChatScreen t={t} />,
    groups: <GroupsScreen t={t} />,
    pages: <PagesScreen t={t} />,
    events: <EventsScreen t={t} />,
    explore: <ExploreScreen t={t} />,
    reels: <ReelsScreen t={t} />,
    photos: <PhotosScreen t={t} />,
    live: <LiveScreen t={t} />,
    notifications: <NotificationsScreen t={t} />,
    saved: <SavedScreen t={t} posts={posts} />,
    settings: <SettingsScreen t={t} dark={dark} setDark={setDark} />,
    marketplace: <MarketplaceScreen t={t} />,
    creator: <CreatorScreen t={t} />,
    admin: <AdminScreen t={t} />,
  };

  return (
    <div data-theme={dark ? "dark" : "light"} style={{ background: t.bg, minHeight: "100vh" }}>
      <GlobalStyle />
      <TopNav t={t} dark={dark} setDark={setDark} view={view} go={setView} unread={NOTIFS.length} />
      <div style={{ display: "flex", maxWidth: 1280, margin: "0 auto" }}>
        <LeftSidebar t={t} view={view} go={setView} />
        <main style={{ flex: 1, minWidth: 0, paddingBottom: 40 }}>{screens[view] || screens.home}</main>
        {view === "home" && <RightRail t={t} go={setView} />}
      </div>
      {view === "home" && <FloatingCompose t={t} onClick={() => setModal({ type: "compose" })} />}
      {modal?.type === "compose" && <CreatePostModal t={t} onClose={() => setModal(null)} onPost={addPost} />}
      {modal?.type === "comments" && <CommentsModal t={t} post={modal.post} onClose={() => setModal(null)} />}
      {modal?.type === "share" && <ShareModal t={t} onClose={() => setModal(null)} />}
    </div>
  );
}

function GlobalStyle() {
  return (
    <style>{`
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
      * { box-sizing: border-box; font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
      input, textarea { font-family: inherit; }
      @keyframes poaSpin { to { transform: rotate(360deg); } }
      @keyframes poaPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.3); border-radius: 8px; }
      @media (max-width: 900px) { .hide-md { display: none !important; } }
      @media (max-width: 1150px) { .hide-lg { display: none !important; } }
      @media (max-width: 640px) { .hide-sm { display: none !important; } }
    `}</style>
  );
