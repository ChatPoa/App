/* =================================================================
   SHARED PRIMITIVES
================================================================= */
function Avatar({ person, size = 40, ring, t }) {
  return (
    <div style={{ width: size, height: size, borderRadius: "50%", padding: ring ? 3 : 0, background: ring ? GRAD : "transparent", flexShrink: 0 }}>
      <div style={{ width: "100%", height: "100%", borderRadius: "50%", background: person.grad, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 600, fontSize: size * 0.36, border: ring ? `2px solid ${t.surface}` : "none" }}>
        {person.initials}
      </div>
    </div>
  );
}
function NameRow({ person, t, size = 14.5 }) {
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: 4 }}>
      <span style={{ fontWeight: 600, fontSize: size, color: t.text1 }}>{person.name}</span>
      {person.verified && <BadgeCheck size={size} color={BLUE} fill={t.surface} />}
    </span>
  );
}
function Card({ t, children, style }) {
  return <div style={{ background: t.surface, border: `1px solid ${t.line}`, borderRadius: 16, ...style }}>{children}</div>;
}
function Btn({ t, variant = "secondary", children, onClick, icon: Icon, style, full }) {
  const base = { display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 8, borderRadius: 10, fontWeight: 600, fontSize: 14, cursor: "pointer", padding: "10px 18px", border: "1px solid transparent", width: full ? "100%" : "auto" };
  const styles = {
    primary: { background: GRAD, color: "#fff" },
    secondary: { background: t.surface2, color: t.text1, border: `1px solid ${t.line}` },
    ghost: { background: "transparent", color: t.text2 },
    danger: { background: "transparent", color: "#EF4444", border: "1px solid rgba(239,68,68,0.35)" },
  };
  return <button onClick={onClick} style={{ ...base, ...styles[variant], ...style }}>{Icon && <Icon size={16} />}{children}</button>;
}
function IconBtn({ t, icon: Icon, badge, onClick, active }) {
  return (
    <button onClick={onClick} style={{ position: "relative", width: 40, height: 40, borderRadius: "50%", border: "none", background: active ? t.surface2 : "transparent", color: active ? BLUE : t.text2, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}>
      <Icon size={20} />
      {badge > 0 && <span style={{ position: "absolute", top: 2, right: 2, background: "#EF4444", color: "#fff", fontSize: 10, fontWeight: 700, borderRadius: 999, minWidth: 16, height: 16, display: "flex", alignItems: "center", justifyContent: "center", padding: "0 4px" }}>{badge}</span>}
    </button>
  );
}
function Skeleton({ w = "100%", h = 14, t }) {
  return <div style={{ width: w, height: h, borderRadius: 8, background: t.surface2, animation: "poaPulse 1.4s ease-in-out infinite" }} />;
}
function EmptyState({ t, icon: Icon, title, subtitle, cta }) {
  return (
    <div style={{ textAlign: "center", padding: "60px 24px", color: t.text2 }}>
      <div style={{ width: 56, height: 56, borderRadius: "50%", background: t.surface2, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px" }}>
        <Icon size={24} color={t.text3} />
      </div>
      <div style={{ fontWeight: 700, fontSize: 16, color: t.text1, marginBottom: 6 }}>{title}</div>
      <div style={{ fontSize: 14, marginBottom: cta ? 18 : 0 }}>{subtitle}</div>
      {cta}
    </div>
  );
}
function SectionHeader({ t, title, action }) {
  return (
    <div style={{ position: "sticky", top: 0, background: t.glass, backdropFilter: "blur(10px)", padding: "16px 20px", borderBottom: `1px solid ${t.line}`, zIndex: 5, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
      <span style={{ fontWeight: 700, fontSize: 19, color: t.text1, letterSpacing: "-0.01em" }}>{title}</span>
      {action}
    </div>
  );
}

/* =================================================================
   LOGO
================================================================= */
function PoaMark({ size = 34 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 64 64" fill="none" aria-hidden="true">
      <defs>
        <linearGradient id="poaG" x1="4" y1="4" x2="60" y2="60" gradientUnits="userSpaceOnUse">
          <stop offset="0" stopColor={BLUE} /><stop offset="1" stopColor={CYAN} />
        </linearGradient>
      </defs>
      <rect x="4" y="4" width="56" height="56" rx="18" fill="url(#poaG)" />
      <path d="M32 17c-9.4 0-17 6.6-17 14.7 0 4.4 2.2 8.4 5.8 11.1l-1.2 6.4 7-3.6c1.7.5 3.5.7 5.4.7 9.4 0 17-6.6 17-14.6S41.4 17 32 17z" fill="#fff" />
      <circle cx="24.5" cy="31.6" r="2.6" fill="url(#poaG)" />
      <circle cx="32" cy="31.6" r="2.6" fill="url(#poaG)" />
      <circle cx="39.5" cy="31.6" r="2.6" fill="url(#poaG)" />
    </svg>
  );
}

/* =================================================================
   AUTH SCREENS (1-8): Splash, Welcome, Login, Register,
   Verify Email, Forgot Password, Reset Password, Create Username
================================================================= */
function AuthShell({ t, children }) {
  return (
    <div style={{ minHeight: "100vh", background: t.bg, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div style={{ width: 400, maxWidth: "100%" }}>{children}</div>
    </div>
  );
}
function Field({ t, label, type = "text", value, onChange, placeholder, toggle }) {
  const [show, setShow] = useState(false);
  return (
    <label style={{ display: "block", marginBottom: 14 }}>
      <span style={{ fontSize: 13, fontWeight: 600, color: t.text2, display: "block", marginBottom: 6 }}>{label}</span>
      <div style={{ position: "relative" }}>
        <input
          type={toggle ? (show ? "text" : "password") : type}
          value={value} onChange={onChange} placeholder={placeholder}
          style={{ width: "100%", padding: "12px 14px", borderRadius: 10, border: `1px solid ${t.line}`, background: t.surface2, color: t.text1, fontSize: 14.5, outline: "none" }}
        />
        {toggle && (
          <button onClick={() => setShow(!show)} style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", color: t.text3, cursor: "pointer" }}>
            {show ? <EyeOff size={17} /> : <Eye size={17} />}
          </button>
        )}
      </div>
    </label>
  );
}
function SplashScreen({ t, go }) {
  return (
    <AuthShell t={t}>
      <div style={{ textAlign: "center" }}>
        <div style={{ margin: "0 auto 20px", width: 84, height: 84 }}><PoaMark size={84} /></div>
        <div style={{ fontWeight: 800, fontSize: 26, color: t.text1, letterSpacing: "-0.02em" }}>ChatPoa</div>
        <div style={{ fontSize: 14, color: t.text2, marginTop: 6 }}>Where the world stays in touch</div>
        <div onAnimationEnd={() => go("welcome")} style={{ margin: "40px auto 0", width: 28, height: 28, borderRadius: "50%", border: `3px solid ${t.line}`, borderTopColor: BLUE, animation: "poaSpin 0.9s linear infinite" }} />
        <Btn t={t} variant="ghost" onClick={() => go("welcome")} style={{ marginTop: 24 }}>Skip</Btn>
      </div>
    </AuthShell>
  );
}
function WelcomeScreen({ t, go }) {
  return (
    <AuthShell t={t}>
      <div style={{ width: 72, marginBottom: 24 }}><PoaMark size={56} /></div>
      <h1 style={{ fontSize: 30, fontWeight: 800, color: t.text1, letterSpacing: "-0.02em", lineHeight: 1.15, margin: "0 0 10px" }}>Connect with people who get you.</h1>
      <p style={{ fontSize: 15, color: t.text2, lineHeight: 1.6, margin: "0 0 32px" }}>Posts, communities, marketplace and messaging — one clean, fast home for it all.</p>
      <Btn t={t} variant="primary" full onClick={() => go("register")} icon={ArrowRight} style={{ marginBottom: 10, flexDirection: "row-reverse" }}>Create account</Btn>
      <Btn t={t} variant="secondary" full onClick={() => go("login")}>Log in</Btn>
    </AuthShell>
  );
}
function LoginScreen({ t, go }) {
  return (
    <AuthShell t={t}>
      <div style={{ marginBottom: 28 }}><PoaMark size={40} /></div>
      <h2 style={{ fontSize: 22, fontWeight: 700, color: t.text1, margin: "0 0 20px" }}>Log in to ChatPoa</h2>
