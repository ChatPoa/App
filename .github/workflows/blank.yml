/* =================================================================
   POST + STORIES
================================================================= */
function StoryRail({ t }) {
  return (
    <div style={{ display: "flex", gap: 12, padding: "14px 18px", overflowX: "auto" }}>
      {[ME, ...PEOPLE].map((p, i) => (
        <div key={p.handle + i} style={{ flexShrink: 0, width: 74, height: 118, borderRadius: 14, background: p.grad, position: "relative", overflow: "hidden", cursor: "pointer" }}>
          <div style={{ position: "absolute", inset: 0, background: "linear-gradient(to top, rgba(0,0,0,0.55), transparent 50%)" }} />
          <div style={{ position: "absolute", top: 8, left: 8, width: 28, height: 28, borderRadius: "50%", border: "2.5px solid #fff", background: t.surface }} />
          <span style={{ position: "absolute", bottom: 8, left: 8, right: 8, color: "#fff", fontSize: 11, fontWeight: 600 }}>{i === 0 ? "Your story" : p.name.split(" ")[0]}</span>
        </div>
      ))}
    </div>
  );
}
function PostCard({ t, post, onLike, onOpenComments, onOpenShare }) {
  return (
    <Card t={t} style={{ padding: 16, marginBottom: 14 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <Avatar person={post.user} size={42} t={t} />
          <div>
            <NameRow person={post.user} t={t} />
            <div style={{ fontSize: 12.5, color: t.text3 }}>{post.time} · public</div>
          </div>
        </div>
        <MoreHorizontal size={18} color={t.text3} style={{ cursor: "pointer" }} />
      </div>
      <p style={{ fontSize: 15, lineHeight: 1.55, color: t.text1, margin: "0 0 10px" }}>{post.text}</p>
      {post.tag && <span style={{ fontSize: 12.5, fontWeight: 600, color: BLUE, background: `${BLUE}14`, padding: "3px 10px", borderRadius: 999 }}>#{post.tag}</span>}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 14, paddingTop: 10, borderTop: `1px solid ${t.line}` }}>
        <button onClick={() => onLike(post.id)} style={{ display: "flex", alignItems: "center", gap: 6, border: "none", background: "transparent", cursor: "pointer", color: post.liked ? BLUE : t.text2, fontSize: 13.5, fontWeight: 600 }}>
          <ThumbsUp size={17} fill={post.liked ? BLUE : "none"} /> {post.likes}
        </button>
        <button onClick={() => onOpenComments(post)} style={{ display: "flex", alignItems: "center", gap: 6, border: "none", background: "transparent", cursor: "pointer", color: t.text2, fontSize: 13.5, fontWeight: 600 }}>
          <MessageSquare size={17} /> {post.comments}
        </button>
        <button onClick={onOpenShare} style={{ display: "flex", alignItems: "center", gap: 6, border: "none", background: "transparent", cursor: "pointer", color: t.text2, fontSize: 13.5, fontWeight: 600 }}>
          <Share2 size={16} /> Share
        </button>
        <button style={{ border: "none", background: "transparent", cursor: "pointer", color: t.text2 }}><Bookmark size={17} /></button>
      </div>
    </Card>
  );
}

/* =================================================================
   SCREEN: Home Feed (covers Home Feed, News Feed, Stories,
   Create Post, Single Post, Comments, Share)
================================================================= */
function HomeFeed({ t, posts, setPosts, openCompose, openComments, openShare }) {
  const toggleLike = (id) => setPosts(posts.map((p) => p.id === id ? { ...p, liked: !p.liked, likes: p.liked ? p.likes - 1 : p.likes + 1 } : p));
  return (
    <div style={{ maxWidth: 620, margin: "0 auto", padding: "16px 14px" }}>
      <Card t={t} style={{ marginBottom: 14 }}><StoryRail t={t} /></Card>
      <Card t={t} style={{ padding: 14, marginBottom: 14, display: "flex", alignItems: "center", gap: 10 }}>
        <Avatar person={ME} size={38} t={t} />
        <button onClick={openCompose} style={{ flex: 1, textAlign: "left", padding: "10px 16px", borderRadius: 999, border: "none", background: t.surface2, color: t.text3, fontSize: 14, cursor: "pointer" }}>
          What's on your mind, {ME.name.split(" ")[0]}?
        </button>
        <IconBtn t={t} icon={ImageIcon} />
      </Card>
      {posts.map((p) => (
        <PostCard key={p.id} t={t} post={p} onLike={toggleLike} onOpenComments={openComments} onOpenShare={openShare} />
      ))}
    </div>
  );
}

