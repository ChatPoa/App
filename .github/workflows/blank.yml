/* =================================================================
   DESIGN SYSTEM — tokens
   Palette: signal blue + cyan, white canvas, dark-mode twin.
   Type: Inter standing in for SF Pro Display (no CDN access to it).
   Radius 12–16px. Glass used only on the top nav + modals.
================================================================= */
const LIGHT = {
  bg: "#F5F8FD", surface: "#FFFFFF", surface2: "#F0F4FA",
  text1: "#0E1526", text2: "#5B6478", text3: "#93A0B4",
  line: "#E8EDF5", glass: "rgba(255,255,255,0.72)",
};
const DARK = {
  bg: "#0A0F1C", surface: "#111827", surface2: "#182236",
  text1: "#EEF2FA", text2: "#9AA4B8", text3: "#5D6780",
  line: "rgba(255,255,255,0.08)", glass: "rgba(17,24,39,0.72)",
};
const BLUE = "#2F6BFF";
const CYAN = "#17C3E6";
const GRAD = `linear-gradient(135deg, ${BLUE} 0%, ${CYAN} 100%)`;

function useTokens(dark) {
  const t = dark ? DARK : LIGHT;
  return { ...t, blue: BLUE, cyan: CYAN, grad: GRAD, danger: "#EF4444", success: "#22C55E", warn: "#F5A623" };
}

