/* =================================================================
   SCREEN: Chat (covers Inbox, Chat List, 1:1 Chat, Group Chat,
   Voice Call, Video Call, Shared Media)
================================================================= */
function ChatScreen({ t }) {
  const [activeId, setActiveId] = useState(CONVERSATIONS[0].id);
  const [call, setCall] = useState(null);
  const [showMedia, setShowMedia] = useState(false);
  const [draft, setDraft] = useState("");
  const [thread, setThread] = useState([
    { mine: false, text: "That mockup looks great, ship it" },
    { mine: true, text: "On it, deploying tonight" },
  ]);
  const active = CONVERSATIONS.find((c) => c.id === activeId);
  const send = () => { if (!draft.trim()) return; setThread([...thread, { mine: true, text: draft.trim() }]); setDraft(""); };
  return (
    <div style={{ display: "flex", height: "calc(100vh - 61px)" }}>
      <div className="hide-sm" style={{ width: 300, flexShrink: 0, borderRight: `1px solid ${t.line}`, overflowY: "auto" }}>
        <div style={{ padding: "16px 18px 8px", fontWeight: 700, fontSize: 18, color: t.text1 }}>Chats</div>
        {CONVERSATIONS.map((c) => (
          <button key={c.id} onClick={() => setActiveId(c.id)} style={{ width: "100%", display: "flex", gap: 10, padding: "10px 18px", border: "none", background: activeId === c.id ? t.surface2 : "transparent", cursor: "pointer", textAlign: "left" }}>
            <Avatar person={c.person} size={44} t={t} />
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ display: "flex", justifyContent: "space-between" }}><NameRow person={c.person} t={t} size={13.5} /><span style={{ fontSize: 11, color: t.text3 }}>{c.time}</span></div>
              <div style={{ fontSize: 12.5, color: t.text2, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{c.last}</div>
            </div>
            {c.unread > 0 && <span style={{ background: GRAD, color: "#fff", fontSize: 10, fontWeight: 700, borderRadius: 999, minWidth: 17, height: 17, display: "flex", alignItems: "center", justifyContent: "center" }}>{c.unread}</span>}
          </button>
        ))}
      </div>
      <div style={{ flex: 1, display: "flex", flexDirection: "column" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 20px", borderBottom: `1px solid ${t.line}` }}>
          <Avatar person={active.person} size={38} t={t} />
          <NameRow person={active.person} t={t} />
          <div style={{ marginLeft: "auto", display: "flex", gap: 4 }}>
            <IconBtn t={t} icon={Phone} onClick={() => setCall("voice")} />
            <IconBtn t={t} icon={Video} onClick={() => setCall("video")} />
            <IconBtn t={t} icon={ImageIcon} onClick={() => setShowMedia(!showMedia)} />
          </div>
        </div>
        {showMedia && (
          <div style={{ display: "flex", gap: 8, padding: "12px 20px", borderBottom: `1px solid ${t.line}`, overflowX: "auto" }}>
            {PEOPLE.map((p, i) => <div key={i} style={{ width: 56, height: 56, borderRadius: 10, background: p.grad, flexShrink: 0 }} />)}
          </div>
        )}
        <div style={{ flex: 1, padding: 20, display: "flex", flexDirection: "column", gap: 8, overflowY: "auto" }}>
          {thread.map((m, i) => (
            <div key={i} style={{ alignSelf: m.mine ? "flex-end" : "flex-start", maxWidth: "68%", background: m.mine ? GRAD : t.surface2, color: m.mine ? "#fff" : t.text1, padding: "9px 14px", borderRadius: 16, borderBottomRightRadius: m.mine ? 4 : 16, borderBottomLeftRadius: m.mine ? 16 : 4, fontSize: 14 }}>{m.text}</div>
          ))}
        </div>
        <div style={{ display: "flex", gap: 10, padding: "14px 20px", borderTop: `1px solid ${t.line}` }}>
          <input value={draft} onChange={(e) => setDraft(e.target.value)} onKeyDown={(e) => e.key === "Enter" && send()} placeholder="Message..." style={{ flex: 1, border: `1px solid ${t.line}`, background: t.surface2, borderRadius: 999, padding: "10px 16px", color: t.text1, outline: "none", fontSize: 14 }} />
          <IconBtn t={t} icon={Mic} />
          <button onClick={send} style={{ width: 40, height: 40, borderRadius: "50%", border: "none", background: GRAD, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}><Send size={16} /></button>
        </div>
      </div>
      {call && (
        <div style={{ position: "fixed", inset: 0, background: "#0A0F1C", zIndex: 60, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", color: "#fff" }}>
          <Avatar person={active.person} size={110} t={t} />
          <div style={{ fontWeight: 700, fontSize: 20, marginTop: 16 }}>{active.person.name}</div>
          <div style={{ color: "#9AA4B8", marginTop: 4 }}>{call === "voice" ? "Voice call" : "Video call"} · 00:14</div>
          <div style={{ display: "flex", gap: 16, marginTop: 40 }}>
            <button style={{ width: 52, height: 52, borderRadius: "50%", border: "none", background: "#1F2937", color: "#fff", cursor: "pointer" }}><Mic size={20} /></button>
            <button onClick={() => setCall(null)} style={{ width: 52, height: 52, borderRadius: "50%", border: "none", background: "#EF4444", color: "#fff", cursor: "pointer" }}><Phone size={20} /></button>
          </div>
        </div>
      )}
    </div>
  );
}

