          </div>
        ))}
      </Card>
    </aside>
  );
}

function FloatingCompose({ t, onClick }) {
  return (
    <button onClick={onClick} style={{ position: "fixed", bottom: 26, right: 26, width: 56, height: 56, borderRadius: "50%", background: GRAD, border: "none", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", boxShadow: "0 10px 30px rgba(47,107,255,0.35)", zIndex: 25 }}>
      <Edit3 size={22} />
    </button>
  );
}

/* =================================================================
   MODALS: Create Post, Comments, Share
================================================================= */
function ModalShell({ t, onClose, children, width = 480 }) {
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(10,15,28,0.55)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 50, padding: 16 }}>
      <div onClick={(e) => e.stopPropagation()} style={{ width, maxWidth: "100%", maxHeight: "85vh", overflowY: "auto", background: t.surface, borderRadius: 18, border: `1px solid ${t.line}` }}>
        {children}
      </div>
    </div>
  );
}
function CreatePostModal({ t, onClose, onPost }) {
  const [text, setText] = useState("");
  return (
    <ModalShell t={t} onClose={onClose}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "16px 18px", borderBottom: `1px solid ${t.line}` }}>
        <span style={{ fontWeight: 700, fontSize: 16, color: t.text1 }}>Create post</span>
        <button onClick={onClose} style={{ border: "none", background: "transparent", color: t.text2, cursor: "pointer" }}><X size={20} /></button>
      </div>
      <div style={{ padding: 18 }}>
        <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 14 }}>
          <Avatar person={ME} size={40} t={t} />
          <NameRow person={ME} t={t} />
        </div>
        <textarea autoFocus value={text} onChange={(e) => setText(e.target.value)} placeholder={`What's on your mind, ${ME.name.split(" ")[0]}?`} rows={5} style={{ width: "100%", border: "none", outline: "none", resize: "none", background: "transparent", color: t.text1, fontSize: 16 }} />
        <div style={{ display: "flex", gap: 10, padding: "12px 0", borderTop: `1px solid ${t.line}`, marginTop: 8 }}>
          <IconBtn t={t} icon={ImageIcon} />
          <IconBtn t={t} icon={Video} />
          <IconBtn t={t} icon={MapPin} />
        </div>
        <Btn t={t} variant="primary" full disabled={!text.trim()} onClick={() => { if (text.trim()) { onPost(text.trim()); onClose(); } }}>Post</Btn>
      </div>
    </ModalShell>
  );
}
function CommentsModal({ t, post, onClose }) {
  const comments = [
    { person: PEOPLE[3], text: "This is so clean, congrats team!" },
